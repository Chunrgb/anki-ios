name: anki_ios
description: Anki spaced repetition flashcard app for iOS, powered by the Anki Rust core.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.0.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  webview_flutter: ^4.7.0
  webview_flutter_wkwebview: ^3.14.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.3
  file_picker: ^8.1.2
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_rust_bridge_codegen: ^2.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: false
  assets:
    - assets/images/
    - assets/css/
